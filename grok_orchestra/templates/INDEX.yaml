# -----------------------------------------------------------------------------
# Grok Agent Orchestra — certified template catalog.
#
# This file is machine-readable. The CLI (`grok-orchestra templates`)
# does NOT list it; downstream catalog surfaces (marketplaces, docs
# generators, `grok-orchestra init` discovery UIs) consume it.
#
# Schema:
#   version:    int — bump on breaking changes to this file's shape.
#   templates:  list of entries, each with:
#     - name              human-readable name
#     - slug              filesystem slug (matches the YAML filename stem)
#     - mode              resolved orchestra.mode
#     - pattern           resolved orchestra.orchestration.pattern
#     - combined          bool (true iff combined: true)
#     - description       one-line human summary
#     - categories        list of tags (free-form, keep consistent)
#     - estimated_tokens  rough ceiling for one happy-path run
#     - marketplace_badges  ordered list of ≤ 4 short badges
# -----------------------------------------------------------------------------

version: 1

templates:
  - name: Native 4-agent Daily Thread
    slug: orchestra-native-4
    mode: native
    pattern: native
    combined: false
    description: >-
      Daily X thread on a trending topic via the xAI native multi-agent
      endpoint. Medium reasoning effort, 4 agents — the cost / quality
      sweet spot for day-to-day shipping.
    categories: [daily, x-thread, trending, production-ready]
    estimated_tokens: 8000
    marketplace_badges: [fast, cheap, production-ready]

  - name: Native 16-agent Weekly Research
    slug: orchestra-native-16
    mode: native
    pattern: native
    combined: false
    description: >-
      Weekly deep-research thread. 16 agents at high reasoning effort —
      the setup Orchestra was designed for when the output has to be
      right. Auto-degrade on 429s.
    categories: [weekly, x-thread, research, long-form, premium]
    estimated_tokens: 32000
    marketplace_badges: [premium, rigorous, cited]

  - name: Truthseeker Debate
    slug: orchestra-simulated-truthseeker
    mode: simulated
    pattern: native
    combined: false
    description: >-
      Full visible Grok / Harper / Benjamin / Lucas debate over 3 rounds
      for a single fact-check. Harper searches; Benjamin runs code for
      numerical checks; Lucas hunts flaws.
    categories: [fact-check, audit, transparent, debate]
    estimated_tokens: 13000
    marketplace_badges: [transparent, auditable, safety-first]

  - name: Hierarchical Research Report
    slug: orchestra-hierarchical-research
    mode: simulated
    pattern: hierarchical
    combined: false
    description: >-
      Two-team hierarchy — ResearchTeam (Harper + Benjamin) gathers,
      CritiqueTeam (Lucas + Grok) stress-tests, Grok synthesises into an
      X thread. Great for research-report-to-thread workflows.
    categories: [research, x-thread, structured, two-team]
    estimated_tokens: 22000
    marketplace_badges: [structured, rigorous, thread-ready]

  - name: Dynamic Trend Analyzer
    slug: orchestra-dynamic-spawn-trend-analyzer
    mode: simulated
    pattern: dynamic-spawn
    combined: false
    description: >-
      Grok splits "biggest X trends today" into 3 sub-analyses;
      Harper + Lucas mini-debates run concurrently, Grok aggregates.
      Trades sequential rounds for fan-out parallelism.
    categories: [trends, parallel, fan-out, daily]
    estimated_tokens: 15000
    marketplace_badges: [parallel, fast, daily]

  - name: Policy Debate Loop
    slug: orchestra-debate-loop-policy
    mode: simulated
    pattern: debate-loop
    combined: false
    description: >-
      Iterate up to 5 rounds toward a maximally-balanced 280-char
      summary of a contested topic; exits early on consensus. Mid-loop
      Lucas veto catches framing bias between iterations.
    categories: [policy, iteration, balance, safety]
    estimated_tokens: 25000
    marketplace_badges: [iterative, balanced, safety-first]

  - name: Parallel-tools Fact Check
    slug: orchestra-parallel-tools-fact-check
    mode: native
    pattern: parallel-tools
    combined: false
    description: >-
      Native 4-agent run with enforced per-agent tool routing — Harper
      owns the internet, Benjamin owns the sandbox, Lucas and Grok
      reason from the transcript. Off-list tool calls produce warnings.
    categories: [fact-check, tool-routing, audit, production-ready]
    estimated_tokens: 9000
    marketplace_badges: [auditable, tool-scoped, production-ready]

  - name: Resilient Native 16
    slug: orchestra-recovery-resilient
    mode: native
    pattern: recovery
    combined: false
    description: >-
      Native-16 run wrapped in the recovery pattern — on rate-limit or
      tool-execution errors, degrades to grok-4.20-0309 at medium
      effort and retries once. Zero overhead on the happy path.
    categories: [production, resilient, scheduled, premium]
    estimated_tokens: 35000
    marketplace_badges: [resilient, production-ready, premium]

  - name: Combined Trendseeker (cron-ready)
    slug: combined-trendseeker
    mode: simulated
    pattern: native
    combined: true
    description: >-
      Flagship combined run — Bridge generates a lightweight X scraper
      module, Orchestra debates the scraped output, Lucas vetoes the
      synthesis, deploy. Built to be cron-scheduled.
    categories: [combined, flagship, scheduled, x-thread, bridge]
    estimated_tokens: 50000
    marketplace_badges: [flagship, combined, scheduled]

  - name: Combined Coder-Critic (TS CLI)
    slug: combined-coder-critic
    mode: simulated
    pattern: native
    combined: true
    description: >-
      Bridge generates a small TypeScript CLI; Orchestra runs a 4-role
      critique of the generated code itself; Lucas vetoes the review
      thread; deploy writes files + posts the review thread to X.
    categories: [combined, code-review, typescript, bridge]
    estimated_tokens: 55000
    marketplace_badges: [combined, code-review, ship-ready]
