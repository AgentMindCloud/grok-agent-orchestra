name: hierarchical-starter
goal: "Use two teams (ResearchTeam + CritiqueTeam) to draft a considered short essay."

orchestra:
  mode: simulated
  debate_rounds: 1
  include_verbose_streaming: true
  orchestration:
    pattern: hierarchical
    config: {}
  agents:
    - {name: Harper, role: researcher}
    - {name: Benjamin, role: logician}
    - {name: Lucas, role: contrarian}
    - {name: Grok, role: coordinator}

safety:
  lucas_veto_enabled: true
  confidence_threshold: 0.75
  max_veto_retries: 1

deploy:
  target: stdout
  post_to_x: false
