name: basic-simulated
goal: "Draft a tweet via a visible Grok / Harper / Benjamin / Lucas debate."

orchestra:
  mode: simulated
  debate_rounds: 2
  debate_style: prompt-simulated
  include_verbose_streaming: true
  orchestration:
    pattern: native
  agents:
    - {name: Grok, role: coordinator}
    - {name: Harper, role: researcher}
    - {name: Benjamin, role: logician}
    - {name: Lucas, role: contrarian}

safety:
  lucas_veto_enabled: true
  confidence_threshold: 0.75
  max_veto_retries: 1

deploy:
  target: stdout
  post_to_x: false
