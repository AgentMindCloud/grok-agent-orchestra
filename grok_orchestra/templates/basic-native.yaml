name: basic-native
goal: "Draft a tweet about today's xAI launch using the Grok 4.20 native multi-agent model."

orchestra:
  mode: native
  agent_count: 4
  reasoning_effort: medium
  include_verbose_streaming: true
  orchestration:
    pattern: native

safety:
  lucas_veto_enabled: true
  confidence_threshold: 0.75
  max_veto_retries: 1

deploy:
  target: stdout
  post_to_x: false
