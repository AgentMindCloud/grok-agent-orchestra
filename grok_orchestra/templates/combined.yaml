name: combined-starter
goal: "Build a small Python module, debate the design, then post about it."

combined: true

build:
  name: my_module
  target: python
  files:
    - path: my_module/__init__.py
      template: |
        """A small module."""

        def hello() -> str:
            return "hello"
    - path: my_module/cli.py
      template: |
        from . import hello

        def main() -> None:
            print(hello())

        if __name__ == "__main__":
            main()

orchestra:
  mode: simulated
  debate_rounds: 1
  include_verbose_streaming: true
  orchestration:
    pattern: native
  agents:
    - {name: Grok, role: coordinator}
    - {name: Harper, role: researcher}
    - {name: Benjamin, role: logician}
    - {name: Lucas, role: contrarian}

safety:
  lucas_veto_enabled: true
  confidence_threshold: 0.75
  max_veto_retries: 0

deploy:
  target: stdout
  post_to_x: false
