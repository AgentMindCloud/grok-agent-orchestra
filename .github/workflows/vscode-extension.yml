# -----------------------------------------------------------------------------
# VS Code extension CI — lint + typecheck + esbuild bundle + vsix package on
# every PR / main push that touches `extensions/vscode/`. On version tags
# (`vscode-v*`) it also publishes to the VS Code Marketplace via vsce.
#
# Marketplace publish requires one secret (set in repo Settings → Secrets):
#   VSCE_PAT   — Personal Access Token from
#                https://dev.azure.com/{org}/_usersSettings/tokens
#                with `Marketplace → Manage` scope. Document this in
#                `docs/integrations/vscode.md`.
# -----------------------------------------------------------------------------

name: vscode-extension

on:
  push:
    branches: [main]
    tags: ["vscode-v*"]
    paths:
      - "extensions/vscode/**"
      - ".github/workflows/vscode-extension.yml"
  pull_request:
    branches: [main]
    paths:
      - "extensions/vscode/**"
      - ".github/workflows/vscode-extension.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vscode-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: extensions/vscode
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extensions/vscode/package-lock.json

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Bundle (esbuild)
        run: npm run package

      - name: Package vsix (no publish)
        if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/vscode-v')
        run: npm run vsce:package

      - name: Upload .vsix as artefact
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: agent-orchestra.vsix
          path: extensions/vscode/agent-orchestra.vsix

      - name: Publish to VS Code Marketplace
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/vscode-v')
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npm run vsce:publish -- -p "$VSCE_PAT"
