name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Every job that imports `grok_orchestra` relies on `grok_build_bridge`
# being importable. Until Bridge publishes to PyPI we do NOT let pip
# pull the dep from there — install Orchestra with `--no-deps`, add the
# explicit runtime deps, and let `tests/conftest.py` inject the Bridge
# shim at test time. Non-test jobs avoid importing `grok_orchestra`
# directly (see schema-check below).

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - name: Install Orchestra (--no-deps) + explicit runtime + dev deps
        # Version specs are quoted so bash does not interpret `>=` as a
        # redirection operator — important for multi-token install lines.
        run: |
          python -m pip install --upgrade pip
          pip install "xai-sdk>=1.0" "pyyaml>=6" "rich>=13" "typer>=0.12" "tenacity>=8.2" "jsonschema>=4.21"
          pip install --no-deps -e .
          pip install ruff mypy
      - name: Ruff
        run: ruff check .
      - name: Mypy (non-blocking during pre-1.0)
        run: mypy grok_orchestra
        continue-on-error: true

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install Orchestra (--no-deps) + explicit runtime + test deps
        run: |
          python -m pip install --upgrade pip
          pip install "xai-sdk>=1.0" "pyyaml>=6" "rich>=13" "typer>=0.12" "tenacity>=8.2" "jsonschema>=4.21"
          pip install --no-deps -e .
          pip install pytest pytest-asyncio pytest-cov
      - name: Pytest (with coverage)
        # Use `python -m pytest` so it always runs in the same interpreter
        # the runtime deps were installed into, regardless of any other
        # `pytest` shim on PATH.
        run: python -m pytest --cov=grok_orchestra --cov-report=term-missing --cov-fail-under=85 -q

  schema-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - name: Install only the bits schema-check needs (no Bridge)
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema
      - name: Runtime schema is valid JSON Schema (Draft 2020-12)
        run: |
          python - <<'PY'
          import json
          from jsonschema import Draft202012Validator
          path = "grok_orchestra/schema/orchestra.schema.json"
          with open(path, encoding="utf-8") as fh:
              schema = json.load(fh)
          Draft202012Validator.check_schema(schema)
          print(f"{path}: Draft 2020-12 OK")
          PY
      - name: VS Code schema is valid JSON Schema (Draft-07)
        run: |
          python - <<'PY'
          import json
          from jsonschema import Draft7Validator
          path = "vscode/schemas/orchestra.schema.json"
          with open(path, encoding="utf-8") as fh:
              schema = json.load(fh)
          Draft7Validator.check_schema(schema)
          print(f"{path}: Draft-07 OK")
          PY
      - name: Every bundled template validates against the runtime schema
        # Uses pure jsonschema + yaml, no grok_orchestra import — so
        # we do not need Bridge installed to run schema validation.
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import yaml
          from jsonschema import Draft202012Validator

          with open("grok_orchestra/schema/orchestra.schema.json", encoding="utf-8") as fh:
              schema = json.load(fh)
          validator = Draft202012Validator(schema)

          failed = []
          for path in sorted(Path("grok_orchestra/templates").glob("*.yaml")):
              if path.stem.upper() == "INDEX":
                  continue
              with open(path, encoding="utf-8") as fh:
                  data = yaml.safe_load(fh)
              errors = sorted(validator.iter_errors(data), key=lambda e: list(e.absolute_path))
              if errors:
                  failed.append((path, errors[0]))
                  print(f"FAIL {path}: {errors[0].message}")
              else:
                  print(f"OK  {path}")
          if failed:
              raise SystemExit(1)
          PY

  safety-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - name: Install safety scanner
        run: pip install pip-audit
      - name: pip-audit — fail on known vulnerabilities in runtime deps
        run: pip-audit --requirement requirements.txt --strict

  build:
    needs: [lint, test, schema-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - name: Install build
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build wheel + sdist
        # setuptools does not import the package during build; it only
        # reads pyproject.toml + the source tree, so we do not need
        # Bridge installed here.
        run: python -m build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

# Publishing to PyPI lives in .github/workflows/publish.yml — that workflow
# triggers on `v*.*.*` tag pushes and uses OIDC trusted publishing. Keeping
# the release path out of `ci.yml` avoids accidentally double-publishing
# from a CI run that happens to coincide with a tag.
